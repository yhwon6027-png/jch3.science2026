<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>질량 보존 법칙 마스터 & 포트폴리오</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s ease; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900 mb-2">🧪 질량 보존 법칙 포트폴리오</h1>
            <p class="text-gray-600">점수 규칙: 첫 시도 성공(+20), 재시도 성공(+10), 두 번 오답 시 0점!</p>
        </header>

        <!-- 섹션 1: 사전 퀴즈 -->
        <div id="intro-quiz" class="bg-white rounded-2xl shadow-xl p-8 card fade-in text-center">
            <h2 class="text-2xl font-bold mb-6">입장 퀴즈: 질량 보존 법칙이란?</h2>
            <div class="grid gap-4">
                <button onclick="window.checkIntro(2)" class="p-4 border-2 border-gray-100 rounded-xl hover:bg-blue-50 transition-all text-left">
                    ✅ 반응물의 총 질량과 생성물의 총 질량은 같다.
                </button>
                <button onclick="window.checkIntro(1)" class="p-4 border-2 border-gray-100 rounded-xl hover:bg-red-50 transition-all text-left text-gray-400">
                    ❌ 화학 반응이 일어나면 물질이 새로 생겨 질량이 늘어난다.
                </button>
            </div>
            <div id="intro-msg" class="mt-4 font-bold text-red-500 hidden">다시 생각해보세요!</div>
        </div>

        <!-- 섹션 2: 게임 엔진 -->
        <div id="game-container" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 card hidden fade-in">
            <div class="flex justify-between items-center mb-6">
                <span id="question-number" class="font-bold text-blue-600">문제 1 / 5</span>
                <div class="flex flex-col items-end">
                    <span id="current-score" class="font-bold text-green-600 text-lg">총점: 0</span>
                    <span id="problem-points" class="text-xs text-blue-400 font-semibold">획득 가능 점수: 20</span>
                </div>
            </div>
            <div id="equation-display" class="text-2xl md:text-4xl font-mono bg-slate-50 py-8 rounded-xl border-2 border-slate-100 mb-8 text-center"></div>
            <div class="flex flex-col items-center gap-4">
                <div class="flex items-center gap-4">
                    <input type="number" id="user-answer" class="w-24 p-4 border-2 border-blue-200 rounded-xl text-center text-2xl focus:border-blue-500 outline-none" placeholder="?">
                    <button id="submit-ans-btn" onclick="window.checkAnswer()" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">정답 제출</button>
                </div>
            </div>
            <!-- 힌트 및 피드백 영역 -->
            <div id="feedback-area" class="mt-8 p-6 bg-blue-50 rounded-xl hidden border border-blue-100">
                <p id="feedback-status" class="font-bold mb-2"></p>
                <div id="hint-box" class="bg-white p-3 rounded border border-blue-100 mb-4 text-sm text-gray-700 leading-relaxed"></div>
                <button id="action-btn" class="bg-gray-900 text-white px-6 py-2 rounded-lg font-bold"></button>
            </div>
        </div>

        <!-- 섹션 3: 학습 리포트 및 제출 -->
        <div id="result-report" class="space-y-6 hidden fade-in">
            <div class="bg-white rounded-2xl shadow-lg p-6 text-center border-t-4 border-blue-500">
                <h2 id="final-score-text" class="text-3xl font-bold text-blue-600">최종 누적 점수: 0점</h2>
                <p class="text-gray-500 mt-2">수고하셨습니다! 당신의 학습 데이터를 확인하세요.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h3 class="text-xl font-bold text-red-600 mb-4 flex items-center gap-2">📂 나의 오답 기록</h3>
                <div id="wrong-list" class="space-y-3 max-h-60 overflow-y-auto"></div>
                <button onclick="window.clearWrongNotes()" class="mt-4 text-xs text-gray-400 hover:text-red-500">기록 초기화</button>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h3 class="text-xl font-bold text-blue-800 mb-6">📝 학습 포트폴리오 제출</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="student-id" placeholder="학번 (예: 30101)" class="p-3 border rounded-lg">
                    <input type="text" id="student-name" placeholder="이름" class="p-3 border rounded-lg">
                </div>
                <textarea id="learning-summary" rows="4" placeholder="오늘 배운 내용을 한 문장으로 요약해 보세요." class="w-full p-3 border rounded-lg mb-4"></textarea>
                
                <div class="bg-yellow-50 p-4 rounded-xl mb-4 border border-yellow-100">
                    <h4 class="font-bold text-yellow-800 mb-2 font-sm italic">🤖 AI 선생님 Q&A</h4>
                    <div class="flex gap-2">
                        <input type="text" id="ai-question" placeholder="궁금한 점을 물어보세요." class="flex-1 p-2 border rounded-lg text-sm">
                        <button onclick="window.askAI()" id="ask-btn" class="bg-yellow-500 text-white px-4 py-2 rounded-lg text-sm font-bold">질문</button>
                    </div>
                    <div id="ai-answer" class="mt-3 text-sm text-gray-700 hidden bg-white p-3 rounded border border-yellow-200">
                        <div id="ai-loading" class="loader hidden mb-2"></div>
                        <p id="ai-text"></p>
                    </div>
                </div>

                <button onclick="window.submitPortfolio()" id="submit-btn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 shadow-xl transition-all">
                    포트폴리오 최종 제출
                </button>
                <p id="submit-status" class="mt-2 text-center text-sm font-bold"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "firebase/auth";
        import { getFirestore, collection, addDoc } from "firebase/firestore";

        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'science-chem-3';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        const initAuth = async () => {
            try {
                if (initialToken) await signInWithCustomToken(auth, initialToken);
                else await signInAnonymously(auth);
            } catch (e) { console.error("Auth error:", e); }
        };
        onAuthStateChanged(auth, (u) => { user = u; });
        initAuth();

        const questions = [
            { 
                id: 1, equation: "2H₂ + O₂ → ( ? ) H₂O", correct: 2, title: "물의 합성",
                hints: (val) => val < 2 ? "반응물 쪽 산소 분자 O₂에는 산소(O) 원자가 2개 있습니다. 생성물 H₂O 앞에도 숫자가 필요하겠죠?" : "반응물 2H₂에는 수소(H) 원자가 총 4개(2×2) 있습니다. 생성물 ( ? )H₂O에서 H 원자가 4개가 되려면 무엇이 올까요?"
            },
            { 
                id: 2, equation: "N₂ + 3H₂ → ( ? ) NH₃", correct: 2, title: "암모니아 합성",
                hints: (val) => val < 2 ? "질소(N) 원자를 맞춰볼까요? 반응물 N₂에는 질소 원자가 2개 있습니다." : "수소(H) 원자의 총 개수를 계산해보세요. <strong>분자 3H₂에서는 H 원자가 총 6개(3×2)</strong>입니다. 생성물 ( ? )NH₃에서도 H 원자가 6개가 되어야 합니다."
            },
            { 
                id: 3, equation: "CH₄ + ( ? ) O₂ → CO₂ + 2H₂O", correct: 2, title: "메테인의 연소",
                hints: (val) => "생성물 쪽 산소(O) 원자의 합을 구해봅시다. CO₂에 2개, 2H₂O에 2개(2×1)로 총 4개입니다. 반응물 ( ? )O₂가 산소 원자 4개를 가지려면 빈칸에 무엇이 들어갈까요?"
            },
            { 
                id: 4, equation: "2Mg + O₂ → ( ? ) MgO", correct: 2, title: "마그네슘의 연소",
                hints: (val) => "반응물에 마그네슘(Mg) 원자가 2개, 산소(O) 원자가 2개(O₂) 있습니다. 생성물 MgO 분자가 몇 개 있어야 원자 수가 같아질까요?"
            },
            { 
                id: 5, equation: "HCl + NaOH → NaCl + ( ? ) H₂O", correct: 1, title: "중화 반응",
                hints: (val) => "반응물 전체에서 수소(H) 원자는 2개(HCl에 1개, NaOH에 1개), 산소(O) 원자는 1개입니다. 생성물 H₂O 한 분자의 구성과 비교해 보세요."
            }
        ];

        let currentIdx = 0;
        let totalScore = 0;
        let currentProblemPoints = 20; // 해당 문제에서 획득 가능한 최고 점수
        let failCount = 0; // 이번 문제에서 틀린 횟수

        window.checkIntro = (val) => {
            if (val === 2) {
                document.getElementById('intro-quiz').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                loadQuestion();
            } else {
                const msg = document.getElementById('intro-msg');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 2000);
            }
        };

        const loadQuestion = () => {
            const q = questions[currentIdx];
            currentProblemPoints = 20;
            failCount = 0;
            
            document.getElementById('question-number').innerText = `문제 ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('current-score').innerText = `총점: ${totalScore}`;
            document.getElementById('problem-points').innerText = `획득 가능 점수: ${currentProblemPoints}`;
            document.getElementById('equation-display').innerText = q.equation;
            document.getElementById('feedback-area').classList.add('hidden');
            
            const input = document.getElementById('user-answer');
            input.value = '';
            input.disabled = false;
            document.getElementById('submit-ans-btn').disabled = false;
            input.focus();
        };

        window.checkAnswer = () => {
            const input = document.getElementById('user-answer');
            const userAns = parseInt(input.value);
            if (isNaN(userAns)) return;
            
            const q = questions[currentIdx];
            const feedbackArea = document.getElementById('feedback-area');
            const status = document.getElementById('feedback-status');
            const hintBox = document.getElementById('hint-box');
            const actionBtn = document.getElementById('action-btn');

            feedbackArea.classList.remove('hidden');

            if (userAns === q.correct) {
                // 정답 로직
                status.innerText = "정답입니다! 🌟";
                status.className = "font-bold text-green-600";
                
                let awardedPoints = 0;
                if (failCount === 0) awardedPoints = 20;
                else if (failCount === 1) awardedPoints = 10;
                else awardedPoints = 0;

                totalScore += awardedPoints;
                
                let scoreText = awardedPoints > 0 ? `${awardedPoints}점을 획득했습니다!` : "두 번 이상 틀려 점수 획득이 없습니다.";
                hintBox.innerHTML = `반응 전후 원자 수가 일치합니다. ${scoreText}`;
                
                document.getElementById('current-score').innerText = `총점: ${totalScore}`;
                input.disabled = true;
                document.getElementById('submit-ans-btn').disabled = true;
                
                actionBtn.innerText = "다음 문제";
                actionBtn.onclick = window.nextQuestion;
                actionBtn.className = "mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors";
            } else {
                // 오답 로직
                failCount++;
                totalScore = Math.max(0, totalScore - 20); // 오답 시 20점 감점
                
                // 획득 가능 점수 조정
                if (failCount === 1) currentProblemPoints = 10;
                else currentProblemPoints = 0;

                status.innerText = "오답입니다! (-20점 감점) 🧐";
                status.className = "font-bold text-red-600";
                
                hintBox.innerHTML = `<strong>💡 힌트:</strong><br>${q.hints(userAns)}`;
                
                document.getElementById('current-score').innerText = `총점: ${totalScore}`;
                document.getElementById('problem-points').innerText = `획득 가능 점수: ${currentProblemPoints}`;
                
                saveToLocalWrong(q, userAns);
                
                actionBtn.innerText = "다시 시도";
                actionBtn.onclick = () => {
                    feedbackArea.classList.add('hidden');
                    input.value = '';
                    input.focus();
                };
                actionBtn.className = "mt-4 bg-orange-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-orange-600 transition-colors";
            }
        };

        window.nextQuestion = () => {
            currentIdx++;
            if (currentIdx < questions.length) loadQuestion();
            else showResult();
        };

        const showResult = () => {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('result-report').classList.remove('hidden');
            document.getElementById('final-score-text').innerText = `최종 누적 점수: ${totalScore}점`;
            window.loadWrongNotes();
        };

        const saveToLocalWrong = (q, userVal) => {
            try {
                let wrongs = JSON.parse(localStorage.getItem('chem_wrong_notes') || '[]');
                wrongs.push({ ...q, userVal, date: new Date().toLocaleDateString() });
                localStorage.setItem('chem_wrong_notes', JSON.stringify(wrongs));
            } catch (e) { console.error(e); }
        };

        window.loadWrongNotes = () => {
            const list = document.getElementById('wrong-list');
            const wrongs = JSON.parse(localStorage.getItem('chem_wrong_notes') || '[]');
            list.innerHTML = wrongs.length ? '' : '<p class="text-gray-400 italic text-sm text-center py-4">오답 기록이 없습니다.</p>';
            wrongs.reverse().slice(0, 10).forEach(w => {
                const div = document.createElement('div');
                div.className = "p-3 bg-red-50 rounded-lg border border-red-100 text-sm mb-2";
                div.innerHTML = `<strong>[${w.title}]</strong> ${w.equation.replace('( ? )', '<span class="text-red-600 font-bold underline">'+w.userVal+'</span>')} (정답: ${w.correct})`;
                list.appendChild(div);
            });
        };

        window.clearWrongNotes = () => {
            if(confirm('기록을 삭제할까요?')) {
                localStorage.removeItem('chem_wrong_notes');
                window.loadWrongNotes();
            }
        };

        window.askAI = async () => {
            const questionText = document.getElementById('ai-question').value;
            const aiText = document.getElementById('ai-text');
            const aiAnswerBox = document.getElementById('ai-answer');
            const loader = document.getElementById('ai-loading');
            if(!questionText) return;
            aiAnswerBox.classList.remove('hidden');
            aiText.innerText = '';
            loader.classList.remove('hidden');
            const apiKey = "";
            const systemPrompt = "중학교 과학 선생님으로서 질량 보존 법칙을 친절하게 설명해주세요.";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: questionText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || "답변을 생성할 수 없습니다.";
                aiText.innerText = answer;
                if (user) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'student_questions'), {
                        userId: user.uid, question: questionText, answer: answer, timestamp: new Date().toISOString()
                    });
                }
            } catch (err) {
                aiText.innerText = "연결 오류가 발생했습니다.";
            } finally { loader.classList.add('hidden'); }
        };

        window.submitPortfolio = async () => {
            const sid = document.getElementById('student-id').value;
            const sname = document.getElementById('student-name').value;
            const summary = document.getElementById('learning-summary').value;
            const status = document.getElementById('submit-status');
            if(!sid || !sname || !summary) {
                status.innerText = "모든 정보를 입력해주세요.";
                status.className = "mt-2 text-center text-sm font-bold text-red-500";
                return;
            }
            if(!user) return;
            status.innerText = "제출 중...";
            status.className = "mt-2 text-center text-sm font-bold text-blue-500";
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'portfolios'), {
                    studentId: sid, studentName: sname, score: totalScore, summary: summary,
                    wrongNotes: JSON.parse(localStorage.getItem('chem_wrong_notes') || '[]'),
                    timestamp: new Date().toISOString()
                });
                status.innerText = "제출 성공! 포트폴리오가 저장되었습니다.";
                status.className = "mt-2 text-center text-sm font-bold text-green-600";
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').className = "w-full bg-gray-400 text-white py-4 rounded-xl font-bold cursor-not-allowed";
            } catch (err) {
                status.innerText = "제출 실패. 다시 시도해 주세요.";
            }
        };
    </script>
</body>
</html>
